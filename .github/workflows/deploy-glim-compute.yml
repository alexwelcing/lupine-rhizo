name: Deploy Glim Compute Cloud Run Job

# Phase-D Layer-4: the compute resolution lane. Drains pending_experiments,
# runs real LAMMPS to compute the requested property, writes predicted
# records back to the ledger + completes the experiment — which closes the
# hypothesis verdict + lifecycle trace in the existing worker flow. This is
# the throughput accelerant: hypothesize → test → resolve with real physics.
#
# Committed IaC, mirrors deploy-glim-eval.yml (WIF, Secret Manager single
# source, reproducible). No local Docker — Cloud Build is the authority.

on:
  push:
    branches: [main]
    paths:
      - 'atlas/compute/**'
      - 'atlas/scripts/generate_nist_demos.py'
      - '.github/workflows/deploy-glim-compute.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Workload Identity Federation

    env:
      JOB_NAME: glim-compute
      SCHEDULER_NAME: glim-compute-drain
      WORKER_URL: https://glim-think-v1.aw-ab5.workers.dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Secrets Pre-flight
        run: |
          miss=0
          [ -z "${{ secrets.GCP_PROJECT_ID }}" ] && { echo "::error::MISSING SECRET GCP_PROJECT_ID"; miss=1; }
          [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && { echo "::error::MISSING SECRET GCP_WORKLOAD_IDENTITY_PROVIDER"; miss=1; }
          [ -z "${{ secrets.GCP_SERVICE_ACCOUNT }}" ] && { echo "::error::MISSING SECRET GCP_SERVICE_ACCOUNT"; miss=1; }
          [ -z "${{ secrets.INTERNAL_TASK_TOKEN }}" ] && { echo "::error::MISSING SECRET INTERNAL_TASK_TOKEN"; miss=1; }
          exit $miss

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Set up gcloud
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Stage vendored sources (single source of truth — not committed)
        run: |
          set -euo pipefail
          mkdir -p atlas/compute/_vendor
          cp atlas/scripts/generate_nist_demos.py atlas/compute/_vendor/generate_nist_demos.py
          cp atlas/nist_ipr/index/master_index.json atlas/compute/_vendor/master_index.json
          ls -la atlas/compute/_vendor

      # INTERNAL_TASK_TOKEN is shared infra: created + version-managed by
      # deploy-glim-eval.yml's Secret Manager upsert, and the default
      # compute runtime SA (same SA glim-compute runs as) is already bound
      # secretmanager.secretAccessor on it. So we do NOT re-create/version
      # it here (the WIF deploy SA intentionally lacks secrets.create) —
      # the job below just references the existing secret. Single source of
      # truth = deploy-glim-eval; this job is a consumer.

      - name: Deploy Cloud Run Job (LAMMPS — heavier than the eval job)
        env:
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
        run: |
          set -euo pipefail
          gcloud run jobs deploy "$JOB_NAME" \
            --source atlas/compute \
            --project="$PROJECT" --region="$REGION" \
            --tasks=1 --max-retries=1 --task-timeout=3600 --memory=4Gi --cpu=2 \
            --set-secrets=INTERNAL_TASK_TOKEN=INTERNAL_TASK_TOKEN:latest \
            --set-env-vars=WORKER_URL=${WORKER_URL}

      # The glim-compute Cloud Run Job is deployed + runnable above. The
      # 30-min auto-drain trigger needs the WIF deploy SA to hold
      # roles/cloudscheduler.admin (it is intentionally least-privilege and
      # currently lacks cloudscheduler.jobs.create). Non-fatal + self-
      # documenting: a missing trigger must NOT block the job deploy. To
      # arm auto-drain, grant the deploy SA cloudscheduler.admin (or create
      # the scheduler once) — a privileged IAM decision left to the owner,
      # not silently self-escalated here.
      - name: Upsert Cloud Scheduler (drain every 30 min)
        continue-on-error: true
        env:
          PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          REGION: ${{ secrets.GCP_REGION }}
          SA: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          set -uo pipefail
          gcloud run jobs add-iam-policy-binding "$JOB_NAME" \
            --project="$PROJECT" --region="$REGION" \
            --member="serviceAccount:${SA}" --role=roles/run.invoker >/dev/null 2>&1 || true
          URI="https://run.googleapis.com/v2/projects/${PROJECT}/locations/${REGION}/jobs/${JOB_NAME}:run"
          if gcloud scheduler jobs describe "$SCHEDULER_NAME" --project="$PROJECT" --location="$REGION" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "$SCHEDULER_NAME" --project="$PROJECT" --location="$REGION" \
              --schedule="*/30 * * * *" --uri="$URI" --http-method=POST --oauth-service-account-email="$SA" \
              && echo "scheduler updated" || echo "::warning::scheduler update failed (perms) — job deployed, auto-drain NOT armed"
          elif gcloud scheduler jobs create http "$SCHEDULER_NAME" --project="$PROJECT" --location="$REGION" \
              --schedule="*/30 * * * *" --uri="$URI" --http-method=POST --oauth-service-account-email="$SA" 2>/dev/null; then
            echo "scheduler created"
          else
            echo "::warning::Cloud Scheduler '$SCHEDULER_NAME' not created — WIF deploy SA lacks cloudscheduler.jobs.create."
            { echo "### ⚠️ glim-compute deployed; auto-drain NOT armed";
              echo "The job runs fine (manual: \`gcloud run jobs execute $JOB_NAME\`).";
              echo "To arm the 30-min drain: grant the deploy SA \`roles/cloudscheduler.admin\` then re-run, or create the scheduler once."; } >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          fi

      - name: Smoke — runner --selftest on the CI runner (no LAMMPS needed)
        env:
          INTERNAL_TASK_TOKEN: ${{ secrets.INTERNAL_TASK_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p atlas/scripts # already present; defensive
          cd atlas/compute
          python runner.py --selftest
          echo "selftest passed; Cloud Build image + deployed job are the container authority."
