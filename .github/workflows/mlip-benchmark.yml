name: MLIP elastic-constant benchmark

# Runs the MLIP harness end-to-end, ingests the resulting BenchmarkRecords
# into the glim-think D1 ledger, and triggers per-element /run analysis.
#
# Two execution paths:
#   use_space=true (default) — call the glim-mlip-bench HF ZeroGPU Space.
#       Heavy compute (PyTorch + CHGNet/MACE/M3GNet weights) lives on the
#       Space; this runner only ships HTTP requests. ~1-2 min total job time.
#   use_space=false           — install CHGNet/MACE/M3GNet locally and run
#       the full Python harness on the runner. ~10-15 min job time including
#       cold cache. Useful when the Space is down or weights need refreshing.
#
# The Space URL is read from the GLIM_HF_SPACE secret; defaults to
# https://huggingface.co/spaces/AlexWelcing/glim-mlip-bench. Worker URL from
# GLIM_API_URL secret. Gated Worker writes use INTERNAL_TASK_TOKEN.

on:
  workflow_dispatch:
    inputs:
      use_space:
        description: 'Call the HF ZeroGPU Space (true) vs local install (false)'
        required: false
        type: boolean
        default: true
      mlips:
        description: 'Comma-separated MLIP ids (chgnet, mace_mp0, m3gnet, emt)'
        required: false
        default: 'chgnet'
      elements:
        description: 'Optional comma-separated element subset (default: all 15)'
        required: false
        default: ''
      ingest:
        description: 'POST results to glim-think /ingest/batch'
        required: false
        type: boolean
        default: true
  schedule:
    # Tuesday 11:00 UTC — runs after the unit-7 weekly critique drain
    # (Monday 09:00) so the manifold analysis has fresh MLIP rows.
    - cron: '0 11 * * TUE'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      USE_SPACE: ${{ github.event.inputs.use_space != 'false' }}
      MLIP_SET: ${{ github.event.inputs.mlips || 'chgnet' }}
      ELEMENT_SET: ${{ github.event.inputs.elements || 'Al,Cu,Ni,Ag,Au,Pt,Pd,Pb,Fe,Cr,Mo,W,V,Nb,Ta' }}
      DO_INGEST: ${{ github.event.inputs.ingest != 'false' }}
      GLIM_API_URL: ${{ secrets.GLIM_API_URL || 'https://glim-think-v1.aw-ab5.workers.dev' }}
      GLIM_HF_SPACE: ${{ secrets.GLIM_HF_SPACE || 'https://huggingface.co/spaces/AlexWelcing/glim-mlip-bench' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install thin-client deps (always)
        run: pip install httpx click

      - name: Install heavy MLIP deps (only when use_space=false)
        if: env.USE_SPACE != 'true'
        working-directory: archive/swarm_preprint_review/scripts/mlip_benchmark
        run: |
          pip install ase numpy
          for mlip in $(echo "$MLIP_SET" | tr ',' ' '); do
            case "$mlip" in
              chgnet)   pip install chgnet ;;
              mace_mp0) pip install mace-torch ;;
              m3gnet)   pip install matgl ;;
              emt)      ;;
              *) echo "unknown mlip: $mlip"; exit 1 ;;
            esac
          done

      - name: Run unit tests (extract_references + glim_mlip)
        run: |
          pip install pytest
          python -m pytest archive/swarm_preprint_review/scripts/mlip_benchmark/test_extract_references.py -v
          python -m pytest tools/test_glim_mlip.py -v

      - name: Extract DFT references (CSV + extras)
        working-directory: archive/swarm_preprint_review/scripts/mlip_benchmark
        run: python extract_references.py --out references.json

      - name: Predict via HF Space
        if: env.USE_SPACE == 'true'
        working-directory: tools
        env:
          GLIM_BENCHMARK_RUN_ID: ${{ github.run_id }}
          GLIM_BENCHMARK_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python glim_mlip.py batch \
            --elements "$ELEMENT_SET" \
            --mlips "$MLIP_SET" \
            --references-from ../archive/swarm_preprint_review/scripts/mlip_benchmark/references.json \
            --out ../archive/swarm_preprint_review/scripts/mlip_benchmark/mlip_records.jsonl

      - name: Predict via local install
        if: env.USE_SPACE != 'true'
        working-directory: archive/swarm_preprint_review/scripts/mlip_benchmark
        run: |
          python run_predictions.py \
            --references references.json \
            --mlips "$MLIP_SET" \
            --elements "$ELEMENT_SET" \
            --out mlip_records.jsonl \
            --continue-on-error

      - name: Show summary
        working-directory: archive/swarm_preprint_review/scripts/mlip_benchmark
        run: |
          echo "=== records ==="
          wc -l mlip_records.jsonl
          echo "=== first 3 rows ==="
          head -3 mlip_records.jsonl

      - name: Upload JSONL artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlip-records-${{ github.run_id }}
          path: archive/swarm_preprint_review/scripts/mlip_benchmark/mlip_records.jsonl
          retention-days: 90

      - name: Push to glim-think /ingest/batch
        if: env.DO_INGEST == 'true'
        working-directory: tools
        env:
          INTERNAL_TASK_TOKEN: ${{ secrets.INTERNAL_TASK_TOKEN }}
          GLIM_BENCHMARK_RUN_ID: ${{ github.run_id }}
          GLIM_BENCHMARK_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python glim_mlip.py ingest ../archive/swarm_preprint_review/scripts/mlip_benchmark/mlip_records.jsonl

      - name: Open glim-think MLIP discovery loop
        if: env.DO_INGEST == 'true'
        working-directory: tools
        env:
          INTERNAL_TASK_TOKEN: ${{ secrets.INTERNAL_TASK_TOKEN }}
          GLIM_BENCHMARK_RUN_ID: ${{ github.run_id }}
          GLIM_BENCHMARK_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python glim_mlip.py discovery-loop \
            ../archive/swarm_preprint_review/scripts/mlip_benchmark/mlip_records.jsonl \
            --campaign-id "github:${GITHUB_RUN_ID}" \
            --github-run-id "$GITHUB_RUN_ID" \
            --run-url "$GLIM_BENCHMARK_RUN_URL" \
            --artifact-name "mlip-records-${GITHUB_RUN_ID}"

      - name: Trigger /run analysis (per element)
        if: env.DO_INGEST == 'true'
        working-directory: archive/swarm_preprint_review/scripts/mlip_benchmark
        env:
          INTERNAL_TASK_TOKEN: ${{ secrets.INTERNAL_TASK_TOKEN }}
        run: |
          python - <<'PY'
          import json, os
          import httpx

          api = os.environ["GLIM_API_URL"].rstrip("/")
          token = os.environ.get("INTERNAL_TASK_TOKEN", "").strip()
          elements = sorted({json.loads(line)["element"]
                             for line in open("mlip_records.jsonl") if line.strip()})
          failures = 0
          for el in elements:
              body = {"element": el, "analysis_types": ["manifold", "causal"],
                      "only_styles": ["mlip"]}
              headers = {"Content-Type": "application/json"}
              if token:
                  headers["X-Internal-Token"] = token
              r = httpx.post(f"{api}/run", json=body, headers=headers, timeout=120.0)
              if r.status_code >= 400:
                  failures += 1
                  print(f"  {el}: FAIL HTTP {r.status_code}: {r.text[:300]}")
              else:
                  print(f"  {el}: HTTP {r.status_code}")
          if failures:
              raise SystemExit(f"{failures} /run analysis trigger(s) failed")
          PY
