name: Deploy Glim Think Worker

on:
  push:
    branches:
      - main
    paths:
      - 'glim-think/**'
      - '.github/workflows/deploy-glim-think.yml'
  # Manual trigger — lets a branch be validated on REAL CI (the gating
  # `npm test`/typecheck) before it lands on main. Local vitest has shown
  # false-green here; CI fresh-install is authoritative. Deploy still only
  # runs if tests pass, so dispatching a fix branch is safe.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Without this a hung `npm test`/`npm run lint` sits for GitHub's 6h
    # default, silently blocking deploys (observed: a 33-min stuck run).
    # Fail fast and visibly instead.
    timeout-minutes: 15
    permissions:
      contents: 'read'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: glim-think
        run: |
          npm install --prefer-offline --no-audit

      # `tsc --noEmit` hangs indefinitely in CI on this project (observed:
      # 15 min, killed by the job cap, deploy skipped). continue-on-error
      # does NOT cover a hang — it only applies once a step finishes. A
      # step-level timeout bounds it; lint is advisory here, not a deploy
      # gate, so a timed-out type check must not block the deploy.
      - name: Type check
        working-directory: glim-think
        continue-on-error: true
        timeout-minutes: 4
        run: npm run lint

      - name: Run unit tests
        working-directory: glim-think
        timeout-minutes: 6
        run: npm test

      # Compile src/registry/prompts/*.md → prompts.gen.ts so Evolver-committed
      # prompt variants land in the Worker bundle (wrangler can't read .md at
      # runtime). The generated file is also committed, so this is idempotent.
      - name: Regenerate prompt registry
        working-directory: glim-think
        run: node scripts/gen-prompts.mjs

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: glim-think
          command: deploy

      - name: Report deploy status
        if: always()
        run: |
          curl -X POST https://glim-think-v1.aw-ab5.workers.dev/ops/report \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"$GITHUB_REPOSITORY\",\"workflow\":\"$GITHUB_WORKFLOW\",\"run_id\":\"$GITHUB_RUN_ID\",\"status\":\"${{ job.status }}\",\"commit_sha\":\"$GITHUB_SHA\",\"branch\":\"$GITHUB_REF_NAME\",\"service\":\"glim-think\",\"run_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"started_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
