name: glim-think

# TypeScript Worker verification. Kept separate from the lightweight verify
# workflow because glim-think has its own npm dependency graph and Node runtime.

on:
  push:
    branches: [main]
    paths:
      - 'glim-think/**'
      - '.github/workflows/glim-think.yml'
  pull_request:
    branches: [main]
    paths:
      - 'glim-think/**'
      - '.github/workflows/glim-think.yml'
  workflow_dispatch:

concurrency:
  group: glim-think-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glim-think
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: glim-think/package.json

      - name: Install dependencies
        run: npm ci

      - name: Fast lint
        run: npm run lint:fast

      - name: Test
        run: npm test
