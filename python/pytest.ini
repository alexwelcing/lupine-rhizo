[pytest]
# Pytest config for the lupine_distill MLIP benchmarking package.
# Run from the repo root with:
#   python -m pytest python/tests -q
testpaths = tests
markers =
    unit: fast, isolated unit tests (no I/O, no GPU, no torch_sim)
    integration: CLI / multi-component tests (still no GPU, no torch_sim)
filterwarnings =
    error::pytest.PytestUnraisableExceptionWarning
