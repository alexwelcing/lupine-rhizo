<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Bluebonnet logo hit reel storyboard</title>
  <desc id="desc">Five-frame storyboard for a luminous bluebonnet logo reveal.</desc>
  <defs>
    <radialGradient id="void" cx="50%" cy="44%" r="70%">
      <stop offset="0" stop-color="#20145a"/>
      <stop offset="0.48" stop-color="#081b35"/>
      <stop offset="1" stop-color="#03060d"/>
    </radialGradient>
    <linearGradient id="glowPetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7967ff"/>
      <stop offset="0.42" stop-color="#e45de0"/>
      <stop offset="0.78" stop-color="#ff8c45"/>
      <stop offset="1" stop-color="#fff0a8"/>
