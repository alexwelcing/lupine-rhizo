    <path d="M256 86 C256 146 256 218 256 292 C256 350 254 401 252 437" fill="none" stroke="#f5f0df" stroke-width="17" stroke-linecap="round" opacity="0.9"/>
    <g fill="url(#pearl)">
      <circle cx="256" cy="82" r="22"/>
      <circle cx="256" cy="128" r="24"/>
      <circle cx="256" cy="178" r="27"/>
      <circle cx="256" cy="234" r="34"/>
      <circle cx="256" cy="296" r="42"/>
      <circle cx="256" cy="361" r="30"/>
      <circle cx="256" cy="416" r="23"/>
    </g>
    <g fill="#102f47" opacity="0.14">
      <path d="M238 113 C247 126 266 126 274 113 C271 138 241 138 238 113Z"/>
      <path d="M232 211 C246 229 266 229 280 211 C276 242 236 242 232 211Z"/>
      <path d="M222 276 C239 300 273 300 290 276 C284 326 228 326 222 276Z"/>
      <path d="M238 400 C247 414 266 414 274 400 C271 427 241 427 238 400Z"/>
