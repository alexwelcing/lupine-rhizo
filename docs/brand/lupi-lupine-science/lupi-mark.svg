<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">LUPI bluebonnet raceme mark</title>
  <desc id="desc">Abstract Texas bluebonnet raceme made from pearl florets and folded petal ovals, with no atom or orbit motif.</desc>
  <defs>
    <linearGradient id="petalInk" x1="150" y1="72" x2="362" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c98d2"/>
      <stop offset="0.45" stop-color="#475b9c"/>
      <stop offset="1" stop-color="#102f47"/>
    </linearGradient>
    <linearGradient id="petalShade" x1="190" y1="120" x2="340" y2="394" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9fb4df" stop-opacity="0.92"/>
      <stop offset="0.7" stop-color="#315f86" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#031927" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="pearl" cx="38%" cy="30%" r="68%">
      <stop offset="0" stop-color="#fffdf4"/>
      <stop offset="0.58" stop-color="#f5f0df"/>
      <stop offset="1" stop-color="#d8d0bc"/>
    </radialGradient>
    <filter id="softLift" x="-28%" y="-28%" width="156%" height="156%">
      <feDropShadow dx="0" dy="11" stdDeviation="11" flood-color="#031927" flood-opacity="0.24"/>
    </filter>
  </defs>
  <g filter="url(#softLift)">
    <g fill="url(#petalInk)" opacity="0.96">
      <ellipse cx="231" cy="130" rx="30" ry="62" transform="rotate(-29 231 130)"/>
      <ellipse cx="281" cy="130" rx="30" ry="62" transform="rotate(29 281 130)"/>
      <ellipse cx="214" cy="188" rx="34" ry="76" transform="rotate(-36 214 188)"/>
      <ellipse cx="298" cy="188" rx="34" ry="76" transform="rotate(36 298 188)"/>
      <ellipse cx="205" cy="255" rx="36" ry="84" transform="rotate(-43 205 255)"/>
      <ellipse cx="307" cy="255" rx="36" ry="84" transform="rotate(43 307 255)"/>
      <ellipse cx="215" cy="326" rx="31" ry="72" transform="rotate(-42 215 326)"/>
      <ellipse cx="297" cy="326" rx="31" ry="72" transform="rotate(42 297 326)"/>
    </g>
    <g fill="url(#petalShade)" opacity="0.72">
      <ellipse cx="246" cy="165" rx="28" ry="70" transform="rotate(-10 246 165)"/>
      <ellipse cx="266" cy="165" rx="28" ry="70" transform="rotate(10 266 165)"/>
      <ellipse cx="256" cy="244" rx="44" ry="96"/>
