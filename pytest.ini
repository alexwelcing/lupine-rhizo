[pytest]
# Repository-wide pytest defaults. The python/ subpackage has its own pytest.ini
# for package-local test discovery; this file registers markers used by tests
# outside python/ (e.g. tools/ and gcp/mlip-cell-runner/).
markers =
    unit: fast, isolated unit tests (no I/O, no GPU, no torch_sim)
    integration: CLI / multi-component tests (still no GPU, no torch_sim)
